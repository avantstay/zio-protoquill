name: Scala Steward

# This workflow will launch everyday at 00:00
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  scala-steward:
    timeout-minutes: 45
    runs-on: blacksmith-4vcpu-ubuntu-2404
    name: Scala Steward
    steps:
      - name: Scala Steward
        uses: scala-steward-org/scala-steward-action@v2.75.0
        with:
          github-token: ${{ secrets.SCALA_STEWARD_TOKEN }}
          branches: main
